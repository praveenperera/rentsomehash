name = "rentsomehash"
main = "./worker.js"
compatibility_date = "2026-03-29"

[observability]
enabled = true

[[services]]
binding = "HASHPOWER_API"
service = "rentsomehash-api"

[[ratelimits]]
name = "CALCULATOR_RATE_LIMITER"
namespace_id = "687732001"
simple = { limit = 30, period = 60 }

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"
run_worker_first = ["/api/*"]
